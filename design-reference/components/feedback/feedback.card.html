<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--canvas); }
  .lbl { font: 500 11px/1 var(--font-sans); color: var(--ink-400); margin: 0 0 12px; letter-spacing: .04em; }
  .stack { display: grid; gap: 14px; max-width: 380px; }
  .group + .group { margin-top: 22px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Banner, Toast, Snackbar, ContextMenu, Icon } = window.TaskClusterDesignSystem_1763fe;
    function Demo() {
      const [ctx, setCtx] = React.useState(false);
      return (
        <div>
          <div className="group">
            <div className="lbl">banners</div>
            <div className="stack">
              <Banner variant="read-only" />
              <Banner variant="planning" />
            </div>
          </div>
          <div className="group">
            <div className="lbl">toast &amp; snackbar</div>
            <div className="stack">
              <Toast>saved</Toast>
              <Snackbar>task deleted</Snackbar>
            </div>
          </div>
          <div className="group" style={{position:'relative'}}>
            <div className="lbl">context menu (origin-aware popup)</div>
            <button onClick={(e)=>setCtx({x:e.clientX,y:e.clientY})} className="tc-pressable"
              style={{border:'1px solid var(--hairline-strong)',background:'var(--surface)',borderRadius:8,padding:'8px 16px',cursor:'pointer',
                font:'400 14px/1 var(--font-sans)',color:'var(--ink-700)'}}>Long-press target ↗</button>
            <ContextMenu open={!!ctx} anchor={ctx} onClose={()=>setCtx(false)}
              title="Launch prep"
              items={[
                {icon:'plus',label:'Add task',onClick:()=>setCtx(false)},
                {icon:'pencil',label:'Rename',onClick:()=>setCtx(false)},
                {divider:true},
                {icon:'x',label:'Delete section',danger:true,onClick:()=>setCtx(false)},
              ]} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
