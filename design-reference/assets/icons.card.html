<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 16px 8px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap: 8px; color: var(--ink-700); }
  .n { font: 400 11px/1 var(--font-sans); color: var(--ink-400); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Icon } = window.TaskClusterDesignSystem_1763fe;
    const names = ["chevron-down","chevron-right","chevron-left","check","search","plus","minus","x","pencil","more-vertical","calendar","import","upload","download","undo","info","clock","settings","trash","star","file","copy","share"];
    function Demo(){
      return <div className="grid">{names.map(n =>
        <div className="cell" key={n}><Icon name={n} size={24} /><span className="n">{n}</span></div>
      )}</div>;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
