<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark" subtitle="Type-set, lowercase — the app speaks quietly, even about itself" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 30px; background: #fff; display:flex; align-items:center; gap: 40px; }
  .mark { font: 500 34px/1 var(--font-sans); letter-spacing: -0.025em; color: var(--ink-900); }
  .mark b { color: var(--blue); font-weight: 500; }
  .sep { width:1px; height: 52px; background: var(--hairline-strong); }
  .alt { font: 500 40px/1 var(--font-sans); letter-spacing: -0.03em; color: var(--ink-900); text-transform: lowercase; }
  .cap { font: 400 12px/1.4 var(--font-sans); color: var(--ink-500); margin-top: 8px; }
  .col { display:flex; flex-direction:column; }
</style>
</head>
<body>
  <div class="col">
    <span class="mark">task<b>·</b>cluster</span>
    <span class="cap">wordmark — one blue dot is the only accent</span>
  </div>
  <div class="sep"></div>
  <div class="col">
    <span class="alt">today</span>
    <span class="cap">in-app header mark</span>
  </div>
</body>
</html>
