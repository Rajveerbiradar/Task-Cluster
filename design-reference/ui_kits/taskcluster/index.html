<!-- @startingPoint section="TaskCluster" subtitle="The full single-screen planner, interactive — time-travel days, add/import/search, the urgency ramp" viewport="440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TaskCluster</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; background: #d9d6cd; display: flex; align-items: stretch; justify-content: center; }
  #tc-appRoot { width: 100%; max-width: 440px; height: 100%; }
  .tc-frame {
    position: relative;
    width: 100%;
    max-width: 440px;
    height: 100vh;
    max-height: 932px;
    margin: 0 auto;
    background: var(--canvas);
    overflow: hidden;
  }
  .tc-scroll { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .tc-scroll::-webkit-scrollbar { width: 0; }
  .tc-bar { position: absolute; left: 0; right: 0; bottom: 22px; display: flex; justify-content: center; z-index: 30; pointer-events: none; }
  .tc-bar > * { pointer-events: auto; }
  .tc-feedback { position: absolute; left: 16px; right: 16px; bottom: 96px; display: flex; justify-content: center; z-index: 35; }
  .tc-feedback > * { max-width: 100%; }
  @keyframes tcFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes tcRise { from { transform: translateY(18px); opacity: 0.4; } to { transform: translateY(0); opacity: 1; } }
  @keyframes tcMenuIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes tcSpringIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes tcSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
</style>
</head>
<body>
  <div id="tc-appRoot"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="tcApp.jsx"></script>
</body>
</html>
