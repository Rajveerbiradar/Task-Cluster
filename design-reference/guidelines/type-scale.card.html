<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="General Sans · weights 400/500 only · sentence case throughout" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 26px; background: #fff; }
  .spec { display:flex; align-items: baseline; gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--hairline); }
  .spec:last-child { border-bottom: 0; }
  .meta { font: 400 11px/1 var(--font-sans); color: var(--ink-400); width: 120px; flex: none; }
</style>
</head>
<body>
  <div class="spec"><span class="meta">display · 40 / 500</span><span class="t-display">Today</span></div>
  <div class="spec"><span class="meta">title · 20 / 500</span><span class="t-title">Morning routine</span></div>
  <div class="spec"><span class="meta">body · 16 / 400</span><span class="t-body">Draft the launch checklist</span></div>
  <div class="spec"><span class="meta">sub · 14 / 400</span><span class="t-sub">Two lines of supporting description, then it truncates.</span></div>
  <div class="spec"><span class="meta">meta · 13 / 500</span><span class="t-meta">3 / 8 · 2h 40m</span></div>
  <div class="spec"><span class="meta">caption · 12 / 400</span><span class="t-caption">viewing — read only</span></div>
</body>
</html>
