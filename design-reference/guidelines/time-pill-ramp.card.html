<!-- @dsCard group="Colors" viewport="700x210" name="Time-pill urgency ramp" subtitle="The app's one piece of drama — calm to alarm as a deadline nears" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--canvas); }
  .ramp { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .step { background: var(--surface); border-radius: 12px; padding: 14px 12px; display:flex; flex-direction:column; gap:12px; min-height: 110px; }
  .when { font: 400 12px/1.3 var(--font-sans); color: var(--ink-500); }
  .pill-line { font: 500 16px/1 var(--font-sans); }
  .grey { color: var(--ink-400); }
  .blue { color: var(--blue); }
  .amber { color: var(--amber); }
  .red { color: var(--red); }
  .cap { align-self: flex-start; font: 500 14px/1 var(--font-sans); color: var(--overdue-text);
         background: var(--overdue-bg); border: 1px solid var(--overdue-border);
         border-radius: 8px; padding: 6px 10px; white-space: nowrap; }
  .treat { font: 400 11px/1.3 var(--font-sans); color: var(--ink-400); margin-top:auto; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="step"><div class="when">plenty &gt;50%</div><div class="pill-line grey">—</div><div class="treat">no pill</div></div>
    <div class="step"><div class="when">on track</div><div class="pill-line blue">2h 40m</div><div class="treat">blue text</div></div>
    <div class="step"><div class="when">getting close</div><div class="pill-line amber">48m</div><div class="treat">amber text</div></div>
    <div class="step"><div class="when">almost due</div><div class="pill-line red">9m</div><div class="treat">red text</div></div>
    <div class="step"><div class="when">overdue</div><div class="cap">−2h 14m</div><div class="treat">red capsule · counts up</div></div>
  </div>
</body>
</html>
