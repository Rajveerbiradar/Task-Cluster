<!-- @dsCard group="Colors" viewport="700x180" name="The one accent — blue" subtitle="Today's date, a checked box, the primary action. Nothing else." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: #fff; display:flex; gap: 28px; align-items:flex-start; }
  .sw { width: 110px; }
  .chip { height: 64px; border-radius: 12px; border: 1px solid var(--hairline-strong); }
  .name { font: 500 12px/1.3 var(--font-sans); color: var(--ink-900); margin-top: 7px; }
  .hex  { font: 400 11px/1.3 var(--font-sans); color: var(--ink-500); }
  .uses { font: 400 13px/1.6 var(--font-sans); color: var(--ink-600); max-width: 300px; }
  .uses b { color: var(--blue); font-weight: 500; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:999px; background:var(--blue); vertical-align: middle; margin-right:6px;}
</style>
</head>
<body>
  <div style="display:flex; gap:10px;">
    <div class="sw"><div class="chip" style="background:var(--blue)"></div><div class="name">blue</div><div class="hex">#378ADD</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-press)"></div><div class="name">blue-press</div><div class="hex">#2C72BC</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-tint)"></div><div class="name">blue-tint</div><div class="hex">#EAF2FB</div></div>
  </div>
  <div class="uses">
    Blue earns its place in exactly three roles:<br>
    <span class="dot"></span><b>today</b> on the date strip<br>
    <span class="dot"></span>a <b>checked</b> box<br>
    <span class="dot"></span>the <b>primary action</b><br>
    Never a surface. Never body text. Never decoration.
  </div>
</body>
</html>
