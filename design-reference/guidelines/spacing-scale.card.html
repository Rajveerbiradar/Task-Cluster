<!-- @dsCard group="Spacing" viewport="700x200" name="8pt spacing scale" subtitle="Generous, premium-receipt rhythm — every gap is a multiple of 4/8" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 26px; background: #fff; }
  .bar { display:flex; align-items:center; gap: 14px; padding: 5px 0; }
  .swatch { height: 16px; background: var(--blue); border-radius: 3px; }
  .tok { font: 500 12px/1 var(--font-sans); color: var(--ink-900); width: 92px; }
  .val { font: 400 12px/1 var(--font-sans); color: var(--ink-400); }
</style>
</head>
<body>
  <div class="bar"><span class="tok">--space-1</span><span class="swatch" style="width:4px"></span><span class="val">4</span></div>
  <div class="bar"><span class="tok">--space-2</span><span class="swatch" style="width:8px"></span><span class="val">8</span></div>
  <div class="bar"><span class="tok">--space-3</span><span class="swatch" style="width:12px"></span><span class="val">12</span></div>
  <div class="bar"><span class="tok">--space-4</span><span class="swatch" style="width:16px"></span><span class="val">16</span></div>
  <div class="bar"><span class="tok">--space-6</span><span class="swatch" style="width:24px"></span><span class="val">24</span></div>
  <div class="bar"><span class="tok">--space-8</span><span class="swatch" style="width:32px"></span><span class="val">32</span></div>
  <div class="bar"><span class="tok">--space-12</span><span class="swatch" style="width:48px"></span><span class="val">48</span></div>
</body>
</html>
